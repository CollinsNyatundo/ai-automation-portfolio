<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Tool Pattern — Modular Tool Workflow Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'JetBrains Mono', monospace; 
      background: #fffffe; 
      min-height: 100vh; 
      display: flex; 
      justify-content: center; 
      padding: 40px 20px; 
    }
    @media (prefers-color-scheme: dark) {
      body { background: #020617; }
      .box { fill: #1e293b; stroke: #334155; }
      .box.c-purple { fill: #4c1d95; stroke: #7c3aed; }
      .box.c-teal { fill: #134e4a; stroke: #0f766e; }
      .box.c-coral { fill: #7c2d12; stroke: #ea580c; }
      .box.c-gray { fill: #1e293b; stroke: #475569; }
      .arr, .leader { stroke: #334155; }
      .th, .ts, .t { fill: #f8fafc; }
      .c-purple { stroke: #a78bfa; }
      .c-teal { stroke: #0f766e; }
      .c-coral { stroke: #ea580c; }
      .c-gray { stroke: #64748b; }
      .container { stroke: none; }
      .title { fill: #f8fafc; }
      .subtitle { fill: #94a3b8; }
    }
    .diagram-container { max-width: 720px; width: 100%; }
  </style>
</head>
<body>
  <div class="diagram-container">
    <svg width="680" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
                markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <!-- Title -->
      <text x="340" y="30" class="title th" text-anchor="middle" font-size="18" font-weight="500">Agent Tool Pattern — Modular Tool Workflow Architecture</text>
      <text x="340" y="50" class="subtitle ts" text-anchor="middle" font-size="12">Master Orchestrator delegates to Callable Tool Workflows • Defined I/O • Versioned • Reusable</text>

      <!-- MASTER ORCHESTRATOR -->
      <g class="container c-purple" transform="translate(40, 80)">
        <rect x="0" y="0" width="600" height="120" rx="12" stroke-width="0.5"/>
        <text class="th" x="300" y="24" text-anchor="middle" dominant-baseline="central">Master Orchestrator: AI Marketing Team Agent</text>
        <text class="ts" x="300" y="46" dominant-baseline="central" text-anchor="middle">GPT-4.1 via OpenRouter • Telegram Trigger • Simple Memory</text>
        <text class="t" x="300" y="72" dominant-baseline="central" text-anchor="middle">
          <tspan x="300" dy="0">Routes user requests via ToolWorkflow nodes to 6 specialized sub-workflows</tspan>
          <tspan x="300" dy="18">Each tool has defined I/O schema • callable independently • versioned separately</tspan>
        </text>
        <text class="ts" x="300" y="100" dominant-baseline="central" text-anchor="middle">
          Workflow: AI_Marketing_Team.json  •  ToolWorkflow nodes with defined I/O schemas
        </text>
      </g>

      <!-- TOOL WORKFLOWS GRID -->
      <g transform="translate(40, 220)">
        <text class="th" x="0" y="0">Callable Tool Workflows (6 Tools)</text>
      </g>

      <!-- Tool 1: Blog Post -->
      <g class="container c-teal" transform="translate(40, 260)">
        <rect x="0" y="0" width="280" height="120" rx="8" stroke-width="0.5"/>
        <text class="th" x="140" y="20" text-anchor="middle">📝 Blog Post Tool</text>
        <text class="ts" x="140" y="40" text-anchor="middle">Workflow: Blog_Post.json</text>
        <text class="t" x="140" y="60" text-anchor="middle">
          <tspan x="140" dy="0">Input: {blogTopic, targetAudience, chatID}</tspan>
          <tspan x="140" dy="16">Process: Tavily → GPT-4.1 → Img Prompt → gpt-image-1</tspan>
          <tspan x="140" dy="16">Output: {content, image, driveLink, sheetsLog}</tspan>
        </text>
      </g>

      <!-- Tool 2: LinkedIn Post -->
      <g class="container c-teal" transform="translate(360, 260)">
        <rect x="0" y="0" width="280" height="120" rx="8" stroke-width="0.5"/>
        <text class="th" x="140" y="20" text-anchor="middle">💼 LinkedIn Post Tool</text>
        <text class="ts" x="140" y="40" text-anchor="middle">Workflow: LinkedIn_Post.json</text>
        <text class="t" x="140" y="60" text-anchor="middle">
          <tspan x="140" dy="0">Input: {postTopic, targetAudience, chatID}</tspan>
          <tspan x="140" dy="16">Process: Tavily → GPT-4.1 → Img Prompt → gpt-image-1</tspan>
          <tspan x="140" dy="16">Output: {content, image, driveLink, sheetsLog}</tspan>
        </text>
      </g>

      <!-- Tool 3: Create Image -->
      <g class="container c-coral" transform="translate(40, 400)">
        <rect x="0" y="0" width="280" height="100" rx="8" stroke-width="0.5"/>
        <text class="th" x="140" y="20" text-anchor="middle">🎨 Create Image Tool</text>
        <text class="ts" x="140" y="40" text-anchor="middle">GPT-4.1 → gpt-image-1 → Drive</text>
        <text class="ts" x="140" y="60" text-anchor="middle">Input: {imagePrompt, imageTitle, chatID}</text>
        <text class="t" x="140" y="80" text-anchor="middle">Output: driveLink, fileName</text>
      </g>

      <!-- Tool 4: Edit Image -->
      <g class="container c-coral" transform="translate(360, 400)">
        <rect x="0" y="0" width="280" height="100" rx="8" stroke-width="0.5"/>
        <text class="th" x="140" y="20" text-anchor="middle">✏️ Edit Image Tool</text>
        <text class="ts" x="140" y="40" text-anchor="middle">GPT-4.1 → gpt-image-1 Edit → Drive</text>
        <text class="ts" x="140" y="60" text-anchor="middle">Input: {image, request, pictureID, chatID}</text>
        <text class="t" x="140" y="80" text-anchor="middle">Output: driveLink, fileName</text>
      </g>

      <!-- Tool 5: Search Images -->
      <g class="container c-purple" transform="translate(40, 520)">
        <rect x="0" y="0" width="280" height="80" rx="8" stroke-width="0.5"/>
        <text class="th" x="140" y="20" text-anchor="middle">🔍 Search Images Tool</text>
        <text class="ts" x="140" y="40" text-anchor="middle">Pinecone Vector Search → Matches</text>
        <text class="ts" x="140" y="60" text-anchor="middle">Input: {intent, imageTitle, chatID}</text>
      </g>

      <!-- Tool 6: Video -->
      <g class="container c-coral" transform="translate(360, 520)">
        <rect x="0" y="0" width="280" height="80" rx="8" stroke-width="0.5"/>
        <text class="th" x="140" y="20" text-anchor="middle">🎬 Video Tool</text>
        <text class="ts" x="140" y="40" text-anchor="middle">PiAPI + Runway + ElevenLabs</text>
        <text class="ts" x="140" y="60" text-anchor="middle">Input: {videoTopic, chatID}</text>
      </g>

      <!-- CONNECTIONS from Orchestrator to Tools (visual) -->
      <g transform="translate(340, 200)">
        <line x1="0" y1="0" x2="0" y2="60" class="arr" marker-end="url(#arrow)" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6,4"/>
        <text class="ts" x="10" y="30" font-size="10" fill="#a78bfa">tool call</text>
      </g>

      <!-- PATTERN EXPLANATION -->
      <g transform="translate(40, 620)">
        <text class="th" x="0" y="0">Pattern: Tool Workflow as Callable Module</text>
        <g transform="translate(0, 25)">
          <text class="ts" x="0" y="0">▸ Each tool = separate n8n workflow with ExecuteWorkflowTrigger → defined I/O schema</text>
          <text class="ts" x="0" y="20">▸ Master calls via ToolWorkflow node: toolWorkflow.node.workflowId.value = sub-workflow ID</text>
          <text class="ts" x="0" y="40">▸ I/O schema: defined in toolWorkflow.node.workflowInputs.mappingMode = "defineBelow"</text>
          <text class="ts" x="0" y="60">▸ Teams invoke via Telegram/API — no n8n canvas knowledge needed</text>
          <text class="ts" x="0" y="80">▸ Versioned independently • Testable in isolation • Swappable without touching orchestrator</text>
        </g>
      </g>

      <!-- I/O SCHEMA DETAIL -->
      <g transform="translate(40, 750)">
        <text class="th" x="0" y="0">Tool I/O Schema Example (Blog Post Tool)</text>
        <g transform="translate(0, 25)">
          <text class="ts" x="0" y="0">Input Schema:</text>
          <text class="t" x="20" y="20">blogTopic: string (required) — "AI automation in healthcare"</text>
          <text class="t" x="20" y="40">targetAudience: string (required) — "healthcare executives"</text>
          <text class="t" x="20" y="60">chatID: string (required) — Telegram chat ID for delivery</text>
          <text class="ts" x="0" y="90">Output Schema:</text>
          <text class="t" x="20" y="110">content: string — Full blog post with headers, sources</text>
          <text class="t" x="20" y="130">imagePrompt: string — Prompt used for gpt-image-1</text>
          <text class="t" x="20" y="150">imageLink: string — Google Drive webViewLink</text>
          <text class="t" x="20" y="170">sheetsLog: object — {Request, ID, Link, Post, Title, Type}</text>
        </g>
      </g>

      <!-- KEY BENEFITS -->
      <g transform="translate(40, 950)">
        <text class="th" x="0" y="0">Why This Pattern?</text>
        <g transform="translate(0, 25)">
          <text class="ts" x="0" y="0">✅ Separation of Concerns — Orchestrator routes; tools execute</text>
          <text class="ts" x="0" y="20">✅ Reusability — Text team calls Blog tool via API; Slack bot calls LinkedIn tool</text>
          <text class="ts" x="0" y="40">✅ Governance — Every tool logs to Sheets + Drive automatically</text>
          <text class="ts" x="0" y="60">✅ Testability — Run any tool standalone with test inputs</text>
          <text class="ts" x="0" y="80">✅ Extensibility — Add new tool: create workflow + add ToolWorkflow node to orchestrator</text>
        </g>
      </g>
    </svg>
  </div>
</body>
</html>
